<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator – Create Strong Passwords Online 2026</title>
    <meta name="description" content="Generate strong, secure passwords instantly with our free online tool. Customizable length, symbols, and numbers. 100% private and secure.">
    
    <style>
        :root {
            --primary: #8b5cf6; /* Violet */
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f1f5f9;
            --accent: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 450px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid #334155;
        }

        h1 { font-size: 1.5rem; margin-bottom: 20px; text-align: center; color: var(--primary); }

        .result-box {
            background: #0f172a;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid var(--primary);
        }

        #passwordOutput { font-family: monospace; font-size: 1.2rem; word-break: break-all; color: var(--accent); }

        .btn-copy { background: transparent; border: none; color: var(--primary); cursor: pointer; font-weight: 600; }

        .setting { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }

        input[type="range"] { width: 100%; margin: 10px 0; accent-color: var(--primary); }

        .btn-generate {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-generate:hover { opacity: 0.9; transform: scale(0.98); }

        .seo-text { margin-top: 30px; font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
    </style>
</head>
<body>

<div class="container">
    <h1>Password Generator</h1>
    
    <div class="result-box">
        <span id="passwordOutput">P@ssw0rd123!</span>
        <button class="btn-copy" onclick="copyToClipboard()">COPY</button>
    </div>

    <div class="setting">
        <span>Length: <b id="lengthVal">12</b></span>
        <input type="range" id="length" min="6" max="32" value="12" oninput="document.getElementById('lengthVal').innerText = this.value">
    </div>

    <div class="setting">
        <label>Include Numbers</label>
        <input type="checkbox" id="numbers" checked>
    </div>

    <div class="setting">
        <label>Include Symbols</label>
        <input type="checkbox" id="symbols" checked>
    </div>

    <button class="btn-generate" onclick="generate()">Generate Password</button>

    <div class="seo-text">
        <p><strong>Why use a strong password?</strong> A strong password protects your personal data from hackers. Our tool generates random sequences that are impossible to guess. All generation happens 100% locally in your browser.</p>
    </div>
</div>

<script>
    function generate() {
        const length = document.getElementById('length').value;
        const useNumbers = document.getElementById('numbers').checked;
        const useSymbols = document.getElementById('symbols').checked;
        
        let charset = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (useNumbers) charset += "0123456789";
        if (useSymbols) charset += "!@#$%^&*()_+~`|}{[]:;?><,./-=";
        
        let password = "";
        for (let i = 0; i < length; i++) {
            password += charset.charAt(Math.floor(Math.random() * charset.length));
        }
        document.getElementById('passwordOutput').innerText = password;
    }

    function copyToClipboard() {
        const text = document.getElementById('passwordOutput').innerText;
        navigator.clipboard.writeText(text);
        alert("Password copied!");
    }
    
    generate(); // Init
</script>
</body>
</html>
